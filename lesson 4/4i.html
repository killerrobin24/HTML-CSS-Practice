<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 4i</title>
        <style>
            .stretch-button{
                color: white;
                background-color: green;
                border: none;
                font-size: 18px;
                padding-top: 8px;
                padding-bottom: 8px;
                padding-right: 15px;
                padding-left: 15px;
                cursor: pointer;
                transition: padding-top 1s,
                    padding-bottom 1s,
                    padding-left 1s,
                    padding-right 1s;
            }
            .stretch-hover{
                padding-top: 18px;
                padding-bottom: 18px;
                padding-left: 36px;
                padding-right: 36px;
            }

        </style>
    </head>
    <body>
        <button class="stretch-buttom">Stretch</button>
    </body>
</html>
