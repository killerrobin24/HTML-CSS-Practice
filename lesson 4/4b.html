<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS lesson 4b</title>
        <style>
            .amazon-button {
                background-color: #ffd814;
                border: none;
                padding-top: 5px;
                padding-bottom: 5px;
                padding-left: 20px;
                padding-right: 20px;
                border-radius: 15px;
                cursor: pointer;
                transition: 0.5s;
            }
            .amazon-button:hover{
                background-color: #e1be0e;
            }
        </style>
    </head>
    <body>
        <button class="amazon-button">Add to Cart</button>
    </body>
</html>
