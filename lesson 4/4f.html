<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 4f</title>
        <style>
            .tweet_button{
                background-color: rgb(29,155,240);
                color: white;
                border: none;

                padding-top: 10px;
                padding-bottom: 10px;
                padding-right: 16px;
                padding-left: 16px;

                border-radius: 18px;
                font-weight: bold;
                font-size: 15px;
                cursor: pointer;
                margin-left: 8px;
                transition: box-shadow 0.15s;
                vertical-align: top;
            }
            .tweet-button:hover{
                box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
            }
        </style>
    </head>
    <body>
        <button class="tweet_button">Tweet</button>
    </body>
</html>
