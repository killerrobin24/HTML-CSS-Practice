<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 4e</title>
        <style>
            .apply_button{
                background-color: rgb(10,102,194);
                color: white;
                border: none;
                padding-top: 12px;
                padding-bottom: 12px;
                padding-left: 24px;
                padding-right: 24px;
                font-weight: bold;
                font-size: 15px;
                border-radius: 20px;
                cursor: pointer;
                margin-right: 8px;
                transition: background-color 0.15s;
            }
            .apply_button:hover{
                background-color: rgba(2, 70, 138);
            }
            .save_button{
                background-color: white;
                color: rgb(10,102,194);
                border-width: 1px;
                border-style: solid;
                border-color: rgb(10,102,194);
                border-radius: 30px;
                padding-top: 12px;
                padding-bottom: 12px;
                padding-left: 24px;
                padding-right: 24px;
                font-weight: bold;
                font-size: 15px;
                cursor: pointer;
                transition: background-color 0.5s, border-width 0.15s, border-width 0.15s, padding 0.15s;
            }
            .save_button:hover{
                background-color: rgb(226, 240 ,254);
                border-with: 2px;
                padding-top: 11px;
                padding-bottom: 11px;
                padding-left: 23px;
                padding-right: 23px;
            }
        </style>
    </head>
    <body>
        <button class="apply_button">Apply on company website</button>
        <button class="save_button">Save</button>
    </body>
</html>
