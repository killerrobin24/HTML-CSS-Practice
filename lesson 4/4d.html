<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 4d</title>
        <Style>
            .get_started_Button{
                background-color: rgb(121,82,179);
                color: white;
                padding-top: 6px;
                padding-bottom:6px;
                padding-left: 8px;
                padding-right: 8px;
                font-weight: bold;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin-right: 6px;
                transition: 0.5s;
            }
            .get_started_Button:hover{
                background-color: rgb(100, 53, 170);
            }
            .download_button{
                background-color: white;
                border-width: 1px;
                border-style: solid;
                border-color: rgb(108,117,125);
                border-radius: 4px;
                color: rgb(108,117,125);
                padding-top: 6px;
                padding-bottom: 6px;
                padding-right: 8px;
                padding-left: 8px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.5s;
            }
            .download_button:hover{
                background-color: gray;
                color: white;
            }
        </Style>
    </head>
    <body>
        <button class="get_started_Button">Get started</button>
        <button class="download_button">Download</button>
    </body>
</html>
