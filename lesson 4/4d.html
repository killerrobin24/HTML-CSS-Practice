<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 4d</title>
        <Style>
            .get_started_Button{
                background-color: rgb(121,82,179);
                color: white;
                padding-top: 12px;
                padding-bottom:12px;
                padding-left: 20px;
                padding-right: 20px;
                font-weight: bold;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin-right: 6px;
                transition: background-color 0.5s;
            }
            .get_started_Button:hover{
                background-color: rgb(90, 60, 156);
            }
            .download_button{
                background-color: white;
                color: rgb(108,117, 125);
                border-width: 1px;
                border-style: solid;
                border-color: rgb(108,177,125);
                border-radius: 4px;
                margin-right: 6px;
                padding-top: 12px;
                padding-bottom: 12px;
                padding-right: 17px;
                padding-left: 17px;
                font-weight: bold;
                cursor: pointer;
                transition: background-color 0.15s, color 0.15s ;
            }
            .download_button:hover{
                background-color: rgb(108, 177, 125);
                color: white;
            }
        </Style>
    </head>
    <body>
        <button class="get_started_Button">Get started</button>
        <button class="download_button">Download</button>
    </body>
</html>
