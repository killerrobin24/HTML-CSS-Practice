<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 4c</title>
        <style>
            .sign-up_button{
                background-color: rgb(46,164,79);
                color: white;
                padding-top: 12px;
                padding-bottom: 12px;
                padding-right: 17px;
                padding-left: 17px;
                font-size: 15px;
                font-weight: bold;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: box-shadow 0.5s;
            }
            .sign-up_button:hover{
                box-shadow: 0px 5px 8px rgba(0,0,0,0.15);
            }
        </style>
    </head>
    <body>
        <button class="sign-up_button">Sign up</button>
    </body>
</html>
