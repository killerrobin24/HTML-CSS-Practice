<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 2e</title>
        <style>
            .apply_button{
                background-color: rgb(10,102,194);
                color: white;
                border: none;
                height: 40px;
                width: 240px;
                font-weight: bold;
                border-radius: 20px;
                cursor: pointer;
                margin-right: 8px;
            }
            .save_button{
                background-color: white;
                color: rgb(10,102,194);
                border-width: 1px;
                border-style: solid;
                border-color: rgb(10,102,194);
                border-radius: 20px;
                height: 40px;
                width: 80px;
                font-weight: bold;
                font-size: 15px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <button class="apply_button">Apply on company website</button>
        <button class="save_button">Save</button>
    </body>
</html>
