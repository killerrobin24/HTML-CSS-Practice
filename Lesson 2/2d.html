<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 2d</title>
        <Style>
            .get_started_Button{
                background-color: rgb(121,82,179);
                color: white;
                height: 40px;
                width: 110px;
                font-weight: bold;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                margin-right: 6px;
            }
            .download_button{
                background-color: white;
                border-width: 1px;
                border-style: solid;
                border-color: rgb(108,117,125);
                border-radius: 4px;
                color: rgb(108,117,125);
                height: 40px;
                width: 100px;
                font-weight: bold;
                cursor: pointer;
            }
        </Style>
    </head>
    <body>
        <button class="get_started_Button">Get started</button>
        <button class="download_button">Download</button>
    </body>
</html>
