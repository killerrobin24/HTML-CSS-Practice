<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 3f</title>
        <style>
            .links{
                color: rgb(0,113,133);
            }
            .links:hover{
                color: orange;
            }
            .title{
                font-size: 24px;
                font-weight: bold;
            }
            .price{
                color: rgb(0,118,0);
            }
            .add_to_cart{
                background-color: rgb(249,217,76);
                border: none;
                height: 30px;
                width: 110px;
                border-radius: 8px;
                cursor: pointer;
            }
            .add_to_cart:hover{
                background-color: rgb(225, 194, 53);
            }
            .buy_now{
               background-attachment: rgb(255,164,28);
               border: none;
               height: 30px;
               width: 110px;
               border-radius: 15px;
               cursor: pointer;
            }
            .buy_now:hover{
                background-color: blue;
            }
        </style>
    </head>
    <body>
        <a class="links" href="">Back to Amazon</a>
        <p class="title"> Nike Black Running Shoes</p>
        <p class="price">$39 - in stock.</p>
        <p> Free delevery tomorrow</p>
        <button class="add_to_cart">Add to Cart</button>
        <button class="buy_now">Buy now</button>
    </body>
</html>
