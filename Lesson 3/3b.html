<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS lesson 3b</title>
        <style>
            .amazon-button {
                background-color: #ffd814;
                border: none;
                height: 30px;
                width: 140px;
                border-radius: 15px;
                cursor: pointer;
            }
            .amazon-button:hover{
                background-color: #e1be0e;
            }
        </style>
    </head>
    <body>
        <button class="amazon-button">Add to Cart</button>
    </body>
</html>
