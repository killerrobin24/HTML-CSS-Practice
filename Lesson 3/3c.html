<!DOCTYPE html>
<html>
    <head>
        <title>HTML CSS Lesson 3c</title>
        <style>
            .sign-up_button{
                background-color: rgb(46,164,79);
                color: white;
                height: 40;
                width: 90;
                font-size: 15px;
                font-weight: bold;
                border: none;
                border-radius: 6px;
                cursor: pointer;
            }
            .sign-up_button:hover{
                box-shadow: 0,10,0 gray;
            }
        </style>
    </head>
    <body>
        <button class="sign-up_button">Sign up</button>
    </body>
</html>
